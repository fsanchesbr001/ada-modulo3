spring.application.name=ms-faturas
server.port=8081

security.jwt.secret=01234567890123456789012345678901

spring.datasource.url=jdbc:mysql://localhost:3307/db_faturas
spring.datasource.username=root
spring.datasource.password=root
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration/db_faturas

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.apache.kafka.common.serialization.StringSerializer
messaging.kafka.topics.pagar=pagar
faturas.retry.fixed-delay-ms=120000

management.endpoints.web.exposure.include=health,info,prometheus
