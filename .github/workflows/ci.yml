name: CI

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  verify-quality-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Make Maven wrapper executable
        run: chmod +x mvnw

      - name: Contract drift check (OpenAPI/AsyncAPI mirror)
        shell: bash
        run: |
          set -euo pipefail
          compare_pair() {
            local source_dir="$1"
            local target_dir="$2"
            local extension="$3"

            while IFS= read -r -d '' file; do
              local rel="${file#${source_dir}/}"
              local target_file="${target_dir}/${rel}"

              if [ ! -f "${target_file}" ]; then
                echo "Missing mirrored contract: ${target_file}"
                exit 1
              fi

              if ! diff -u "${file}" "${target_file}"; then
                echo "Contract drift detected for ${rel}"
                exit 1
              fi
            done < <(find "${source_dir}" -type f -name "*.${extension}" -print0)
          }

          compare_pair ".specs/openapi" "specs/001-payment-saga-contracts/contracts/openapi" "yaml"
          compare_pair ".specs/asyncapi" "specs/001-payment-saga-contracts/contracts/asyncapi" "yaml"

      - name: Maven verify (unit, integration, HTTP and messaging PACT)
        run: ./mvnw -B -ntp verify

      - name: SC-009 quality gate (exactly-one backoffice routing)
        run: ./mvnw -B -ntp -pl apps/ms-backoffice -am -Dsurefire.failIfNoSpecifiedTests=false -Dtest=ProblemaFaturaRoutingSc009QualityGateTest test

      - name: SC-006 quality gate (trace propagation continuity)
        run: ./mvnw -B -ntp -pl apps/api-gateway,apps/ms-faturas,apps/ms-comprovantes,apps/ms-notificacoes -am -Dsurefire.failIfNoSpecifiedTests=false -Dtest=TracePropagationSc006QualityGateTest test

      - name: Coverage gate (Jacoco >= 80%)
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import xml.etree.ElementTree as ET
          import glob

          total_covered = 0
          total_missed = 0
          found_line = False

          reports = sorted(
            glob.glob('apps/*/target/site/jacoco/jacoco.xml') +
            glob.glob('libs/*/target/site/jacoco/jacoco.xml')
          )
          if not reports:
            raise SystemExit('No per-module Jacoco reports found; ensure jacoco:report ran successfully')

          for report_path in reports:
            root = ET.parse(report_path).getroot()
            for counter in root.findall('counter'):
              if counter.get('type') == 'LINE':
                total_covered += int(counter.get('covered'))
                total_missed += int(counter.get('missed'))
                found_line = True
                break

          if not found_line:
            raise SystemExit('LINE counter not found in any per-module Jacoco report')

          total = total_covered + total_missed
          if total == 0:
            raise SystemExit('No LINE coverage data found in any Jacoco report')
          ratio = total_covered / total
          print(f'LINE_COVERAGE={ratio:.4f}')
          if ratio < 0.80:
            raise SystemExit(f'Coverage gate failed: {ratio:.4%} < 80.00%')
          PY

  docker-multi-stage-build:
    runs-on: ubuntu-latest
    needs: verify-quality-gates

    strategy:
      fail-fast: true
      matrix:
        module:
          - apps/api-gateway
          - apps/ms-faturas
          - apps/ms-pagamentos
          - apps/ms-comprovantes
          - apps/ms-notificacoes
          - apps/ms-backoffice

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build multi-stage image
        shell: bash
        run: |
          set -euo pipefail
          module="${{ matrix.module }}"
          image_tag="${module//\//-}:ci"

          cat > Dockerfile.ci <<'EOF'
          ARG MODULE
          FROM maven:3.9.8-eclipse-temurin-21 AS build
          WORKDIR /workspace
          COPY . .
          RUN chmod +x mvnw
          RUN ./mvnw -q -pl ${MODULE} -am -DskipTests package \
              && JAR_FILE=$(ls ${MODULE}/target/*.jar | head -n 1) \
              && cp ${JAR_FILE} /tmp/app.jar

          FROM eclipse-temurin:21-jre
          WORKDIR /app
          COPY --from=build /tmp/app.jar /app/app.jar
          ENTRYPOINT ["java", "-jar", "/app/app.jar"]
          EOF

          docker build \
            --build-arg MODULE="${module}" \
            --file Dockerfile.ci \
            --tag "${image_tag}" \
            .
